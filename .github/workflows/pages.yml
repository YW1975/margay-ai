name: deploy-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Audit public content
        run: bash scripts/audit-public-content.sh
      - name: Check documentation
        run: node scripts/check-docs.mjs
      - name: Build static site
        run: node scripts/build-site.mjs
      - name: Verify generated site is publish-safe
        run: |
          test ! -e site/.DS_Store
          ! find site -name '*.map' -print -quit | grep .
          ! rg -n '/Users/[^ ]+/Myprojects/(ccl|margay|margay-ai|margay-studio|margay-gateway|cos|chief-of-staff|super-rll)' site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
